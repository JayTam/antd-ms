name: publish

# 单一 workflow 覆盖 stable + canary 两条发布流。
# 原因：npm Trusted Publisher 每包只能绑一个 (repo, workflow, environment) 组合，
# 合进同一文件名 publish.yml 即可用一条 publisher 配置覆盖两条流。
# environment 字段在 npm 后台留空（可选），npm 不校验 environment，
# 两个 job 仍各自挂 GitHub environment 做部署保护。见 ADR-0009 D7。
on:
  push:
    branches: [main]
  workflow_dispatch:
  pull_request:
    types: [labeled]

permissions:
  contents: write # stable: 回写 Version Packages PR / push tags；canary: 只读即可但合并权限不增风险
  pull-requests: write # stable: 开/合 Version Packages PR；canary: 回写 PR comment
  id-token: write # GitHub OIDC -> npm trusted publishing + provenance

jobs:
  # ──────────────────────────────────────────────
  # stable：main 合入时跑 changesets canonical 流
  # ──────────────────────────────────────────────
  stable:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: release # GitHub 部署保护（可选配 required reviewers）
    concurrency:
      # stable 串行，绝不并发（避免双 publish 抢同一版本号）
      group: release
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          # changesets/action 回写 Version Packages PR 需要 full history
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      # 注意：不设 setup-node 的 registry-url。
      # setup-node 的 registry-url 会在 .npmrc 写入 _authToken 占位符，
      # npm CLI 遇到它就跳过 OIDC 自动交换 -> trusted publishing 失效。
      # OIDC 要求 .npmrc 无 _authToken，让 npm CLI 自行做 OIDC token 交换。
      # 见 ADR-0009 D7（OIDC + pnpm 兼容性坑）。
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # 预检：CHANGELOG 头块健康（frontmatter 必须在顶）。issues 固态 by inject 脚本。
      - name: 预检 CHANGELOG 头块
        run: pnpm tsx ./scripts/inject-changelog-header.ts --check

      # 预构建全部 6 包（显式两阶段，保证洋葱拓扑）。
      # changeset publish 本身不跑 build，只保证发布拓扑顺序（依赖先发）。
      # pnpm -r build 只看 dependencies 不看 devDependencies，
      # 而 ms-flow 通过 devDep + peerDep 依赖 @jaytam/antd-ms 的类型声明，
      # pnpm 不会保证 antd-ms 先构建。分两步显式保证洋葱顺序。
      # 见 ADR-0009 D2（构建顺序 vs 发布顺序）。
      - name: ms-icons 幂等守卫
        run: |
          pnpm --filter @jaytam/icons icons
          if ! git diff --exit-code -- packages/ms-icons/src/icons; then
            echo "::error::ms-icons 的 npm run icons 产生了未提交的源码改动，发布前必须先理解并提交或撤销。"
            git diff --stat -- packages/ms-icons/src/icons
            exit 1
          fi

      # Stage 1：叶子包 + antd-ms（icons / request-ms / schema-render / ms-gantt / antd-ms）
      # 注意：@jaytam/antd-ms 是根 package，不在 pnpm-workspace.yaml 的 packages/* 里，
      # --filter 匹配不到，必须用 pnpm build 直接在根目录跑。
      - name: 构建 Stage 1（叶子包 + antd-ms）
        run: |
          pnpm --filter @jaytam/icons --filter @jaytam/request-ms --filter @jaytam/schema-render --filter @jaytam/ms-gantt build
          pnpm build

      # Stage 2：ms-flow（devDep + peerDep 依赖 antd-ms 的 es/index.d.ts 类型声明）
      - name: 构建 Stage 2（ms-flow）
        run: pnpm --filter @jaytam/ms-flow build

      - name: changeset version / publish
        id: changesets
        uses: changesets/action@v1
        with:
          # version 步骤：跑 changeset version 后立即把 dumi frontmatter 头重提到顶
          # （changeset version 会把新条目插到顶，挤走 frontmatter，见 inject 脚本注释）。
          version: pnpm changeset version && pnpm tsx ./scripts/inject-changelog-header.ts
          publish: pnpm changeset publish
          commit: 'chore(release): version packages'
          title: Version Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # npm OIDC trusted publishing 下发版并附 provenance（Node 24 自带 npm 11+，支持 OIDC）。
          # dry-run 阶段先关掉 provenance，验证 publish 链路后再开（ADR-0009 Phase C 中止条件）。
          NPM_CONFIG_PROVENANCE: 'false'

  # ──────────────────────────────────────────────
  # canary：PR 打 snapshot label 时跑 snapshot publish
  # ──────────────────────────────────────────────
  canary:
    if: github.event_name == 'pull_request' && github.event.label.name == 'snapshot'
    runs-on: ubuntu-latest
    environment: snapshot
    concurrency:
      group: snapshot-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: ms-icons 幂等守卫
        run: |
          pnpm --filter @jaytam/icons icons
          if ! git diff --exit-code -- packages/ms-icons/src/icons; then
            echo "::error::ms-icons 的 npm run icons 产生了未提交的源码改动，发布前必须先理解并提交或撤销。"
            git diff --stat -- packages/ms-icons/src/icons
            exit 1
          fi

      # Stage 1：叶子包 + antd-ms（icons / request-ms / schema-render / ms-gantt / antd-ms）
      - name: 构建 Stage 1（叶子包 + antd-ms）
        run: |
          pnpm --filter @jaytam/icons --filter @jaytam/request-ms --filter @jaytam/schema-render --filter @jaytam/ms-gantt build
          pnpm build

      # Stage 2：ms-flow（devDep + peerDep 依赖 antd-ms 的 es/index.d.ts 类型声明）
      - name: 构建 Stage 2（ms-flow）
        run: pnpm --filter @jaytam/ms-flow build

      - name: changeset snapshot publish (canary)
        id: snapshot
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish --snapshot --tag canary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # dry-run 阶段先关掉 provenance，验证后再开（ADR-0009 Phase C）。
          NPM_CONFIG_PROVENANCE: 'false'

      - name: 回写 canary 版本到 PR comment
        if: steps.snapshot.outputs.published == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const pkgs = JSON.parse(`${{ steps.snapshot.outputs.publishedPackages }}` || '[]');
            const lines = pkgs.map(p => `- \`${p.name}@${p.version}\``);
            const body = [
              '### Canary snapshot 已发布',
              '',
              ...lines,
              '',
              '安装：`npm install @jaytam/antd-ms@canary`（或指定上述版本号）',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
